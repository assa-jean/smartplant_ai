<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlant AI - Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-24 relative overflow-x-hidden">
    <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-emerald-100/50 to-transparent -z-10"></div>
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-200/30 rounded-full blur-3xl -z-10"></div>
    <div class="absolute top-40 -left-20 w-48 h-48 bg-green-200/20 rounded-full blur-2xl -z-10"></div>

    <div class="p-6 flex justify-between items-center bg-white">
        <h1 class="text-2xl font-bold text-emerald-900">Bonjour, <span id="userName" class="text-emerald-600">...</span>!</h1>
        <button class="text-gray-400 text-xl"><i class="fa-regular fa-bell"></i></button>
    </div>

    <div class="p-6">
        <h2 class="text-lg font-extrabold text-emerald-900 tracking-tight">Mes Cultures encours</h2>
        <div class="grid grid-cols-3 gap-4 mb-6">
            <button onclick="selectPlant('Maïs')" class="flex flex-col items-center p-3 bg-white rounded-2xl shadow-sm border-2 border-transparent hover:border-emerald-500 transition">
                <span class="text-3xl">🌽</span>
                <span class="text-xs mt-2 font-medium">Maïs</span>
            </button>
            <button onclick="selectPlant('Manioc')" class="flex flex-col items-center p-3 bg-white rounded-2xl shadow-sm border-2 border-transparent hover:border-emerald-500 transition">
                <span class="text-3xl">🥔</span>
                <span class="text-xs mt-2 font-medium">Manioc</span>
            </button>
            <button onclick="selectPlant('Banane')" class="flex flex-col items-center p-3 bg-white rounded-2xl shadow-sm border-2 border-transparent hover:border-emerald-500 transition">
                <span class="text-3xl">🍌</span>
                <span class="text-xs mt-2 font-medium">Banane</span>
            </button>
        </div>

        <button id="btnScan" class="w-full bg-emerald-700 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-3">
            <i class="fa-solid fa-camera"></i> Lancer le Diagnostic
        </button>
    </div>

    <div class="mt-8">
        <div class="px-6 flex justify-between items-center mb-4">
            <h2 class="text-lg font-extrabold text-emerald-900 tracking-tight">Mes Crédits en Cours</h2>
            <a href="profile.html" class="text-xs font-bold text-emerald-600 hover:underline">Voir plus <i class="fa-solid fa-arrow-right ml-1"></i></a>
        </div>

        <div id="loanSlider" class="flex flex-nowrap overflow-x-auto gap-4 px-6 pb-6 snap-x snap-mandatory no-scrollbar items-start">
            
            <div class="min-w-[85%] snap-center relative overflow-hidden bg-white rounded-[2rem] p-6 shadow-xl shadow-emerald-900/5 border border-emerald-50/50">
                <div class="relative flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-white">
                        <i class="fa-solid fa-hand-holding-dollar text-xl"></i>
                    </div>
                    <div>
                        <p class="font-black text-gray-800 text-base leading-tight">Semences Maïs</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Demande #001</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-end">
                        <span class="text-[11px] font-bold text-emerald-600 italic">Analyse...</span>
                        <span class="text-sm font-black text-emerald-900">30%</span>
                    </div>
                    <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-emerald-500 rounded-full" style="width: 30%"></div>
                    </div>
                </div>
            </div>

            </div>
    </div>

    <style>
        /* Empêche le rebond bizarre sur iOS et cache la barre */
        #loanSlider {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4">
        <button class="text-emerald-700 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px]">Accueil</span></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-leaf"></i><span class="text-[10px]">Diagnostic</span></button>
        <a href="loans.html"><button class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-hand-holding-dollar"></i><span class="text-[10px]">Micro-Loan</span></button></a>
        <a href="profile.html"><button class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-user"></i><span class="text-[10px]">Profil</span></button></a>
    </div>

    <script type="module" src="src/home.js"></script>
</body>
</html>
