<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlant AI - Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <div class="p-6 bg-white shadow-sm flex flex-col items-center pt-12">
        <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-700 text-3xl font-bold mb-4 border-4 border-white shadow-lg">
            <span id="userInitial">-</span>
        </div>
        <h1 id="profName" class="text-2xl font-bold text-emerald-900">Chargement...</h1>
        <p class="text-emerald-600 text-sm font-medium">Agriculteur Vérifié</p>
    </div>

    <div class="p-6 space-y-4">

          <div class="px-6 space-y-4 mt-4">
        <h3 class="text-lg font-bold text-emerald-900">Statistiques des demandes</h3>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 text-center">
                    <p class="text-xl font-black text-emerald-700" id="statTotal">0</p>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Total</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 text-center border-b-emerald-400 border-b-4">
                    <p class="text-xl font-black text-emerald-700" id="statValid">0</p>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Validé</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 text-center border-b-orange-400 border-b-4">
                    <p class="text-xl font-black text-orange-600" id="statPending">0</p>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">En cours</p>
                </div>
            </div>

        </div>

        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 space-y-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Email</p>
                    <p id="profEmail" class="text-gray-700 font-medium">...</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Téléphone</p>
                    <p id="profPhone" class="text-gray-700 font-medium">...</p>
                </div>
            </div>
        </div>

      

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <div class="pt-4">
            <button id="btnLogout" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition hover:bg-red-100">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </button>
        </div>
    </div>


    <div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4">
        <a href="home.html" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px]">Accueil</span></a>
        <a href="diagnostic.html" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-leaf"></i><span class="text-[10px]">Diagnostic</span></a>
        <a href="loans.html" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-hand-holding-dollar"></i><span class="text-[10px]">Micro-Loan</span></a>
        <button class="text-emerald-700 flex flex-col items-center"><i class="fa-solid fa-user"></i><span class="text-[10px]">Profil</span></button>
    </div>

    <script type="module" src="src/profile.js"></script>
</body>
</html>
